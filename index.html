<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>حساب المبيعات - نادي الأعوان</title>
<meta name="theme-color" content="#1a6e3c"/>
<meta name="description" content="تطبيق حساب مبيعات نادي الأعوان"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:#f5f0e8;color:#18181b;min-height:100svh;direction:rtl}
header{background:#1a6e3c;color:white;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.25)}
header h1{font-size:15px;font-weight:900}
.hbtns{display:flex;gap:4px}
.ibtn{background:none;border:none;color:white;cursor:pointer;padding:7px 9px;border-radius:8px;font-size:18px;line-height:1;transition:background .2s}
.ibtn:hover{background:rgba(255,255,255,.15)}
#settings{background:white;border-bottom:1px solid #e4e4e7;padding:16px;display:none}
#settings.open{display:block}
.slabel{font-size:14px;font-weight:700;margin-bottom:10px}
.sbtns{display:flex;gap:10px}
.sbtn{flex:1;padding:12px;border:2px solid #e4e4e7;background:#f4f4f5;border-radius:12px;font-size:16px;font-weight:900;cursor:pointer;transition:all .2s}
.sbtn.aA{background:#16a34a;color:white;border-color:#16a34a;transform:scale(1.05)}
.sbtn.aB{background:#d4a017;color:white;border-color:#d4a017;transform:scale(1.05)}
.sbtn.aC{background:#1a6e3c;color:white;border-color:#1a6e3c;transform:scale(1.05)}
.datenav{padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.navbtn{background:white;border:1px solid #e4e4e7;border-radius:10px;padding:7px 12px;cursor:pointer;font-size:22px;color:#1a6e3c;box-shadow:0 1px 3px rgba(0,0,0,.1);transition:all .15s}
.navbtn:disabled{opacity:.3;cursor:not-allowed}
.navbtn:not(:disabled):active{transform:scale(.93)}
#datetext{font-size:21px;font-weight:900;text-align:center;flex:1}
.card{margin:0 8px;background:white;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:hidden}
.tctrl{display:flex;justify-content:space-between;align-items:center;padding:7px 12px;border-bottom:1px solid #e4e4e7}
.cbtn{background:none;border:none;cursor:pointer;font-size:13px;font-weight:700;padding:4px 8px;border-radius:6px}
.cbtn.undo{color:#1a6e3c}.cbtn.undo:disabled{opacity:.3;cursor:not-allowed}
.cbtn.rst{color:#dc2626}
.twrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:#1a6e3c;color:white}
th{padding:8px 5px;font-size:12px;font-weight:700;white-space:nowrap;text-align:center}
th.th-sm{padding:8px 2px;min-width:36px}
th.th-lg{min-width:100px}
th.sep{border-right:2px solid rgba(255,255,255,.3)}
td{border-bottom:1px solid rgba(228,228,231,.5);padding:0;text-align:center}
td.sep{border-right:2px solid rgba(26,110,60,.25)}
tr.even{background:white}tr.odd{background:#fafafa}
td.col-hl{background:rgba(26,110,60,0.07)!important}
tr.odd td.col-hl{background:rgba(26,110,60,0.12)!important}
td.col-hl input{background:transparent!important}
th.col-hl{background:rgba(0,0,0,0.12)}
td.col-red{background:rgba(220,38,38,0.06)!important}
tr.odd td.col-red{background:rgba(220,38,38,0.11)!important}
td.col-red input{background:transparent!important}
th.col-red{background:rgba(180,20,20,0.18)}
td.col-blue{background:rgba(37,99,235,0.06)!important}
tr.odd td.col-blue{background:rgba(37,99,235,0.11)!important}
td.col-blue input{background:transparent!important}
th.col-blue{background:rgba(20,60,180,0.18)}
td.col-gold{background:rgba(212,160,23,0.13)!important;border-right:2px solid rgba(212,160,23,0.5)!important;border-left:2px solid rgba(212,160,23,0.5)!important}
tr.odd td.col-gold{background:rgba(212,160,23,0.2)!important}
th.col-gold{background:rgba(160,110,0,0.25);border-right:2px solid rgba(212,160,23,0.6)!important;border-left:2px solid rgba(212,160,23,0.6)!important}
td.col-gold.ct{color:#92400e}
/* Column borders */
td.col-hl{border-left:1px solid rgba(26,110,60,0.15)!important;border-right:1px solid rgba(26,110,60,0.15)!important}
td.col-red{border-left:1px solid rgba(220,38,38,0.15)!important;border-right:1px solid rgba(220,38,38,0.15)!important}
td.col-red .ci{min-width:36px;max-width:48px}
td.col-blue .cr{min-width:36px}
td.col-blue{border-left:1px solid rgba(37,99,235,0.15)!important;border-right:1px solid rgba(37,99,235,0.15)!important}
tr.dov{border-top:2px solid #d4a017}
tr.drag{opacity:.4}
.ci{width:100%;border:none;background:transparent;text-align:center;font-size:13px;padding:7px 4px;outline:none;font-family:inherit;min-width:44px}
.ci.nm{min-width:100px;width:100%;text-align:right;padding-right:6px;direction:rtl;font-weight:700}
.ci.add{color:#dc2626;font-weight:700}
.ci.fw{font-weight:700}
.cr{padding:7px 5px;font-size:13px;background:rgba(244,244,245,.7);min-width:44px}
.ct{padding:7px 5px;font-size:13px;background:rgba(26,110,60,.08);font-weight:700;color:#1a6e3c;min-width:52px}
.delbtn{background:none;border:none;color:rgba(220,38,38,.45);cursor:pointer;padding:5px 6px;font-size:14px;line-height:1;transition:color .2s}
.delbtn:hover{color:#dc2626}
.addbtn{width:100%;padding:11px;background:none;border:none;border-top:1px solid #e4e4e7;color:#d4a017;font-weight:700;font-size:14px;cursor:pointer;transition:background .2s}
.addbtn:hover{background:rgba(212,160,23,.07)}
.summary{border-top:2px solid rgba(26,110,60,.2);padding:12px;background:rgba(244,244,245,.4);display:flex;flex-direction:column;gap:9px}
.srow{display:flex;align-items:center;justify-content:space-between;gap:8px}
.slb{font-size:14px;font-weight:700;color:#52525b;white-space:nowrap}
.sval{font-size:14px;font-weight:900;padding:5px 12px;border-radius:8px;min-width:80px;text-align:center}
.sval.g{background:#e8f5ee;color:#1a6e3c}
.sval.y{background:#fef9e7;color:#92400e}
.sinp{width:110px;border:2px solid #1a6e3c;border-radius:8px;padding:6px 8px;text-align:center;font-size:14px;font-weight:700;font-family:inherit;background:white;outline:none;box-shadow:0 0 0 3px rgba(26,110,60,0.12)}
.sinp:focus{border-color:#1a6e3c;box-shadow:0 0 0 4px rgba(26,110,60,0.2)}
.notes{margin:0 8px 8px;background:white;border-radius:0 0 12px 12px;border-top:1px solid rgba(228,228,231,.5);padding:12px}
.nin{display:flex;gap:8px;align-items:flex-start}
.nlb{font-size:13px;font-weight:700;white-space:nowrap;padding-top:6px}
textarea{flex:1;border:1px solid #e4e4e7;border-radius:8px;padding:8px;font-size:13px;resize:none;min-height:44px;font-family:inherit;background:#fafafa;outline:none;direction:rtl;width:100%}
textarea:focus{border-color:#1a6e3c}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.dlg{background:white;border-radius:16px;padding:24px;max-width:340px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.dlg h3{font-size:17px;font-weight:800;margin-bottom:10px}
.dlg p{font-size:14px;color:#71717a;margin-bottom:20px;line-height:1.6}
.dbtns{display:flex;gap:10px;justify-content:flex-end}
.btn{padding:9px 18px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer}
.btn.cn{background:#f4f4f5;color:#18181b}.btn.de{background:#dc2626;color:white}
/* Calculator */
.cdsp{background:#f4f4f5;border-radius:12px;padding:12px 16px;margin-bottom:12px;text-align:left;direction:ltr;min-height:64px}
.cmain{font-size:30px;font-weight:900;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.csub{font-size:12px;color:#71717a;margin-top:4px;min-height:16px}
.cgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.cbk{border:none;border-radius:11px;height:54px;font-size:19px;font-weight:800;cursor:pointer;transition:transform .1s;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.cbk:active{transform:scale(.91)}
.cbk.num{background:white;color:#18181b;border:1px solid #e4e4e7}
.cbk.op{background:#fef3c7;color:#92400e}
.cbk.eq{background:#1a6e3c;color:white;font-size:22px}
.cbk.clr{background:#fee2e2;color:#dc2626}
.cbk.bk{background:#f4f4f5;color:#18181b;font-size:16px}
.cclose{width:100%;margin-top:10px;padding:10px;background:#f4f4f5;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
</style>
</head>
<body>

<header>
  <h1>حساب المبيعات (نادي الأعوان)</h1>
  <div class="hbtns">
    <button class="ibtn" id="installBtn" onclick="installApp()" title="تثبيت التطبيق" style="display:none;align-items:center;gap:4px;font-size:13px;font-weight:700;background:rgba(255,255,255,0.2);border-radius:8px;padding:5px 9px;">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 4v12m0 0l-4-4m4 4l4-4M4 20h16"/></svg>
      تثبيت
    </button>
    <button class="ibtn" onclick="openCalc()" title="آلة حاسبة">🧮</button>
    <button class="ibtn" onclick="shareWhatsApp()" title="إرسال واتساب">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    </button>
    <button class="ibtn" onclick="toggleSettings()" title="إعدادات">⚙️</button>
  </div>
</header>

<div id="settings">
  <p class="slabel">اختر الفصيلة:</p>
  <div class="sbtns">
    <button class="sbtn" id="btnA" onclick="setShift('A')">فصيلة A</button>
    <button class="sbtn" id="btnB" onclick="setShift('B')">فصيلة B</button>
    <button class="sbtn" id="btnC" onclick="setShift('C')">فصيلة C</button>
  </div>
</div>

<div class="datenav">
  <button class="navbtn" id="btnNext" onclick="changeOffset(1)">‹</button>
  <span id="datetext"></span>
  <button class="navbtn" id="btnPrev" onclick="changeOffset(-1)">›</button>
</div>

<div class="card">
  <div class="tctrl">
    <button class="cbtn undo" id="undoBtn" onclick="doUndo()" disabled>↩ تراجع</button>
    <button class="cbtn rst" onclick="askReset()">↺ تصفير</button>
  </div>
  <div class="twrap">
    <table>
      <thead>
        <tr>
          <th></th>
          <th class="col-hl th-lg">السلعة</th><th>الثمن</th>
          <th class="sep col-hl">العدد</th><th class="col-red th-sm">اضافة</th>
          <th class="sep col-hl">الباقي</th><th class="col-blue th-sm">الفرق</th>
          <th class="sep col-gold">المجموع</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <button class="addbtn" onclick="addRow()">＋ إضافة سطر جديد</button>
  <div class="summary">
    <div class="srow">
      <span class="slb">المبلغ المدفوع</span>
      <input class="sinp" type="number" id="amtPaid" inputmode="numeric" value="0" onchange="setAmtPaid(this.value)" onfocus="this.select()"/>
    </div>
    <div class="srow">
      <span class="slb">المجموع</span>
      <span class="sval g" id="grandTotal">0</span>
    </div>
    <div class="srow">
      <span class="slb">الباقي</span>
      <span class="sval y" id="balance">0</span>
    </div>
  </div>
</div>

<div class="notes">
  <div class="nin">
    <span class="nlb">ملاحظة:</span>
    <textarea id="notesInp" placeholder="اكتب ملاحظة هنا..." rows="2" oninput="setNotes(this.value)"></textarea>
  </div>
</div>

<!-- Delete Dialog -->
<div class="overlay" id="delDlg">
  <div class="dlg">
    <h3>تأكيد الحذف</h3>
    <p>هل أنت متأكد من حذف هذا السطر؟ يمكنك التراجع بعد الحذف.</p>
    <div class="dbtns">
      <button class="btn cn" onclick="closeDlg('delDlg')">إلغاء</button>
      <button class="btn de" onclick="confirmDel()">حذف</button>
    </div>
  </div>
</div>

<!-- Reset Dialog -->
<div class="overlay" id="rstDlg">
  <div class="dlg">
    <h3>تأكيد التصفير</h3>
    <p>سيتم تصفير أعمدة العدد والإضافة والباقي لجميع الأسطر.</p>
    <div class="dbtns">
      <button class="btn cn" onclick="closeDlg('rstDlg')">إلغاء</button>
      <button class="btn de" onclick="doReset()">تصفير</button>
    </div>
  </div>
</div>

<!-- Calculator -->
<div class="overlay" id="calcDlg">
  <div class="dlg">
    <h3 style="text-align:center;margin-bottom:12px">آلة حاسبة</h3>
    <div class="cdsp">
      <div class="cmain" id="cdisp">0</div>
      <div class="csub" id="csub"></div>
    </div>
    <div class="cgrid" id="cgrid"></div>
    <button class="cclose" onclick="closeDlg('calcDlg')">إغلاق</button>
  </div>
</div>

<script>
// ===== MODELS =====
const PREFIX='sales_', SKEY='shift_group', MAX_BACK=10, MAX_UNDO=20;
const mkId=()=>Math.random().toString(36).substr(2,9);
const d2s=d=>`${d.getFullYear()}-${('0'+(d.getMonth()+1)).slice(-2)}-${('0'+d.getDate()).slice(-2)}`;
const arDays=['الأحد','الإثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
const fmtAr=s=>{const d=new Date(s+'T00:00:00');return `${arDays[d.getDay()]} ${('0'+d.getDate()).slice(-2)}/${('0'+(d.getMonth()+1)).slice(-2)}/${d.getFullYear()}`};
const shiftFor=(s,g)=>{const ref=new Date('2026-03-02T00:00:00'),t=new Date(s+'T00:00:00'),diff=Math.floor((t-ref)/86400000),idx=((diff%3)+3)%3;return['A','B','C'][idx]};
function latestShift(g){const t=new Date();for(let i=0;i<3;i++){const d=new Date(t);d.setDate(t.getDate()-i);const s=d2s(d);if(shiftFor(s,g)===g)return s;}return d2s(t);}
const calcDiff=(r,all)=>{const b=(r.quantity||0)+(r.addition||0)-(r.remaining||0);if(all&&r.name.trim()==='قوبلي'){const tea=all.find(x=>x.name.trim()==='شاي'),gng=all.find(x=>x.name.trim()==='زنجبيل');return Math.max(b-(tea?calcDiff(tea):0)-(gng?calcDiff(gng):0),0);}return b;};
const calcTotal=(r,all)=>calcDiff(r,all)*(r.price||0);
const grandTot=rows=>rows.reduce((s,r)=>s+calcTotal(r,rows),0);

// ===== STORAGE =====
const saveDay=d=>{try{localStorage.setItem(PREFIX+d.date,JSON.stringify(d));}catch(e){}};
const loadDay=s=>{try{const r=localStorage.getItem(PREFIX+s);return r?JSON.parse(r):null;}catch(e){return null;}};
const getSG=()=>{try{return localStorage.getItem(SKEY)||'A';}catch(e){return'A';}};
const saveSG=g=>{try{localStorage.setItem(SKEY,g);}catch(e){}};

const DEFS=[['قهوة k',45],['ماء',35],['رامي',45],['فرحة',25],['TNT',55],['بيتر',40],['PEPSI',40],['حمود k',45],['حمود',40],['coca kola',50],['رامي شعير',60],['ك.ع',20],['ك.شكولة',45],['ك.تويست',40],['قوفريط',10],['مادلان بيفا',35],['مادلان',20],['ساقا',20],['بيتزا',15],['flaon',35],['قلب اللوز',25],['جبن عادي',10],['جبن البقرة',15],['تونة',80],['شكولا',5],['شامية كبيرة',60],['شامية صغيرة',10],['ساندو سناك',35],['ساندو',45],['سراج',140],['معجون اسنان',125],['فرشاة اسنان',140],['صابون',75],['شامبوان',10],['جوطابل',45],['ورق مزدوج',10],['قلم ازرق',25],['مناديل ورقية',15],['زنجبيل',20],['شاي',10],['قوبلي',5],['لوز + كاجو',100],['كاوكاو .(ص)',10],['كاوكاو . (ك)',60],['يابورت',25],['فرماج',45]];
const defRows=()=>DEFS.map(([n,p])=>({id:mkId(),name:n,price:p,quantity:0,addition:0,remaining:0}));
const carry=rows=>rows.map(r=>({id:mkId(),name:r.name,price:r.price,quantity:0,addition:0,remaining:0}));
function initDay(ds,forcedPrev){
  const ex=loadDay(ds);if(ex)return ex;
  if(forcedPrev&&forcedPrev.length)return{date:ds,rows:carry(forcedPrev),amountPaid:0,discount:0,notes:''};
  const d=new Date(ds+'T00:00:00');
  for(let i=1;i<=60;i++){const p=new Date(d);p.setDate(p.getDate()-i);const pd=loadDay(d2s(p));if(pd&&pd.rows&&pd.rows.length)return{date:ds,rows:carry(pd.rows),amountPaid:0,discount:0,notes:''};}
  return{date:ds,rows:defRows(),amountPaid:0,discount:0,notes:''};
}

// ===== STATE =====
let sg=getSG(), offset=0, data=null, undoStack=[], saveTimer=null, pendingDel=null, dragFrom=null;
// Track last snapshot to avoid duplicate undo entries
let lastSnapshot=null;

function curDate(){const b=latestShift(sg),d=new Date(b+'T00:00:00');d.setDate(d.getDate()+offset*3);return d2s(d);}

function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(()=>saveDay(data),400);}

function pushUndo(){
  const snap=JSON.stringify(data);
  // Only push if state actually changed since last snapshot
  if(snap===lastSnapshot)return;
  undoStack=[...undoStack.slice(-(MAX_UNDO-1)),JSON.parse(snap)];
  lastSnapshot=snap;
  document.getElementById('undoBtn').disabled=false;
}

function doUndo(){
  const p=undoStack.pop();
  if(p){
    data=p;
    lastSnapshot=JSON.stringify(data);
    document.getElementById('undoBtn').disabled=undoStack.length===0;
    render();scheduleSave();
  }
}

function loadCurrent(prevRows){
  const ds=curDate();
  data=initDay(ds, prevRows||[]);
  undoStack=[];
  lastSnapshot=JSON.stringify(data);
  document.getElementById('undoBtn').disabled=true;
}

// ===== WHATSAPP SHARE =====
function shareWhatsApp(){
  const ds=curDate();
  const gt=grandTot(data.rows);
  const bal=(data.amountPaid||0)-gt;
  let msg=`📋 *مبيعات ${fmtAr(ds)}*\n`;
  msg+=`${'─'.repeat(28)}\n`;
  // Only rows with non-zero diff
  const active=data.rows.filter(r=>calcDiff(r,data.rows)>0);
  if(active.length){
    active.forEach(r=>{
      const d=calcDiff(r,data.rows),t=calcTotal(r,data.rows);
      msg+=`• ${r.name}: ${d} × ${r.price} = *${t}*\n`;
    });
  } else {
    msg+=`(لا توجد مبيعات)\n`;
  }
  msg+=`${'─'.repeat(28)}\n`;
  msg+=`💰 *المجموع: ${gt}*\n`;
  if(data.amountPaid) msg+=`💵 المدفوع: ${data.amountPaid}\n`;
  if(data.amountPaid) msg+=`🔄 الباقي: ${bal}\n`;
  if(data.notes) msg+=`📝 ${data.notes}\n`;
  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
}

// ===== ACTIONS =====
function toggleSettings(){document.getElementById('settings').classList.toggle('open');}
function setShift(g){
  const curRows=data?data.rows:[];
  saveDay(data);sg=g;saveSG(g);offset=0;
  document.getElementById('settings').classList.remove('open');
  loadCurrent(curRows);render();
}
function changeOffset(delta){
  const n=offset+delta;
  if(n>0||n<-MAX_BACK)return;
  // حفظ اليوم الحالي أولاً
  if(data){saveDay(data);}
  // أخذ صفوف اليوم الحالي قبل الانتقال (للنسخ إن لم يكن اليوم الجديد محفوظاً)
  const rowsToCarry=data?data.rows:[];
  offset=n;
  loadCurrent(rowsToCarry);
  render();
}

function addRow(){pushUndo();data.rows.push({id:mkId(),name:'',price:0,quantity:0,addition:0,remaining:0});lastSnapshot=JSON.stringify(data);scheduleSave();renderTable();}
function delRow(id){pushUndo();data.rows=data.rows.filter(r=>r.id!==id);lastSnapshot=JSON.stringify(data);pendingDel=null;scheduleSave();renderTable();}
function setAmtPaid(v){pushUndo();data.amountPaid=parseFloat(v)||0;lastSnapshot=JSON.stringify(data);scheduleSave();renderSummary();}
function setNotes(v){pushUndo();data.notes=v;lastSnapshot=JSON.stringify(data);scheduleSave();}
function reorder(from,to){pushUndo();const arr=[...data.rows];const[m]=arr.splice(from,1);arr.splice(to,0,m);data.rows=arr;lastSnapshot=JSON.stringify(data);scheduleSave();renderTable();}
function resetCols(){pushUndo();data.rows=data.rows.map(r=>({...r,quantity:0,addition:0,remaining:0}));data.amountPaid=0;lastSnapshot=JSON.stringify(data);scheduleSave();renderTable();}

function askDel(id){pendingDel=id;document.getElementById('delDlg').classList.add('open');}
function confirmDel(){if(pendingDel)delRow(pendingDel);closeDlg('delDlg');}
function askReset(){document.getElementById('rstDlg').classList.add('open');}
function doReset(){resetCols();closeDlg('rstDlg');}
function closeDlg(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');}));

// ===== RENDER =====
const FIELDS=['name','price','quantity','addition','remaining'];
const SEP=new Set(['quantity','remaining']);

function renderTable(){
  const tb=document.getElementById('tbody');tb.innerHTML='';
  data.rows.forEach((row,idx)=>{
    const diff=calcDiff(row,data.rows),tot=calcTotal(row,data.rows);
    const tr=document.createElement('tr');
    tr.className=idx%2?'odd':'even';
    tr.dataset.idx=idx;
    tr.setAttribute('draggable','true');
    tr.addEventListener('dragstart',()=>{dragFrom=idx;tr.classList.add('drag');});
    tr.addEventListener('dragend',()=>{tr.classList.remove('drag');document.querySelectorAll('#tbody tr').forEach(r=>r.classList.remove('dov'));});
    tr.addEventListener('dragover',e=>{e.preventDefault();document.querySelectorAll('#tbody tr').forEach(r=>r.classList.remove('dov'));tr.classList.add('dov');});
    tr.addEventListener('drop',()=>{if(dragFrom!==null&&dragFrom!==idx)reorder(dragFrom,idx);dragFrom=null;});

    // delete
    const dtd=document.createElement('td');
    dtd.innerHTML=`<button class="delbtn" onclick="askDel('${row.id}')">✕</button>`;
    tr.appendChild(dtd);

    // fields
    FIELDS.forEach(f=>{
      const td=document.createElement('td');
      if(SEP.has(f))td.className='sep';
      if(f==='name'||f==='remaining'||f==='quantity')td.className=(td.className+' col-hl').trim();
      if(f==='addition'){td.className=(td.className+' col-red').trim();td.style.width='44px';}
      const inp=document.createElement('input');
      inp.className='ci'+(f==='name'?' nm':'')+(f==='addition'?' add':'')+(f==='quantity'||f==='remaining'?' fw':'');
      inp.type='text';
      inp.inputMode=f==='name'?'text':'decimal';
      inp.value=f==='name'?row[f]:(row[f]||'');
      inp.dataset.id=row.id;inp.dataset.field=f;
      inp.addEventListener('input',e=>{
        pushUndo();
        const v=f==='name'?e.target.value:(parseFloat(e.target.value)||0);
        data.rows=data.rows.map(r=>r.id===row.id?{...r,[f]:v}:r);
        lastSnapshot=JSON.stringify(data);
        renderTotals();scheduleSave();
      });
      inp.addEventListener('focus',e=>e.target.select());
      inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();const nx=document.querySelector(`#tbody tr[data-idx="${idx+1}"] input[data-field="${f}"]`);if(nx)nx.focus();}});
      td.appendChild(inp);tr.appendChild(td);
    });

    // diff
    const dtd2=document.createElement('td');dtd2.className='cr col-blue';dtd2.textContent=diff||'';tr.appendChild(dtd2);
    // total
    const ttd=document.createElement('td');ttd.className='ct sep col-gold';ttd.textContent=tot||'';tr.appendChild(ttd);
    tb.appendChild(tr);
  });
  renderSummary();
}

function renderTotals(){
  document.querySelectorAll('#tbody tr').forEach((tr,idx)=>{
    const row=data.rows[idx];if(!row)return;
    const cells=tr.querySelectorAll('.cr,.ct');
    if(cells[0])cells[0].textContent=calcDiff(row,data.rows)||'';
    if(cells[1])cells[1].textContent=calcTotal(row,data.rows)||'';
  });
  renderSummary();
}

function renderSummary(){
  const gt=grandTot(data.rows);
  document.getElementById('grandTotal').textContent=gt;
  document.getElementById('balance').textContent=(data.amountPaid||0)-gt;
  document.getElementById('amtPaid').value=data.amountPaid||'';
}

function render(){
  ['A','B','C'].forEach(g=>{const b=document.getElementById('btn'+g);b.className='sbtn'+(sg===g?' a'+g:'');});
  document.getElementById('datetext').textContent=fmtAr(curDate());
  document.getElementById('btnPrev').disabled=offset<=-MAX_BACK;
  document.getElementById('btnNext').disabled=offset>=0;
  document.getElementById('notesInp').value=data.notes||'';
  renderTable();
}

// ===== CALCULATOR =====
const CBTNS=[['C','⌫','%','÷'],['7','8','9','×'],['4','5','6','-'],['1','2','3','+'],['00','0','.','=']];
let cDisp='0',cPrev=null,cOp=null,cRst=false;
function openCalc(){document.getElementById('calcDlg').classList.add('open');buildCalc();}
function buildCalc(){
  const g=document.getElementById('cgrid');g.innerHTML='';
  CBTNS.flat().forEach(b=>{
    const btn=document.createElement('button');
    btn.className='cbk '+(b==='='?'eq':b==='C'?'clr':b==='⌫'?'bk':['+','-','×','÷','%'].includes(b)?'op':'num');
    btn.textContent=b;btn.onclick=()=>cPress(b);g.appendChild(btn);
  });updCalc();
}
function updCalc(){document.getElementById('cdisp').textContent=cDisp;document.getElementById('csub').textContent=cPrev!==null&&cOp?`${cPrev} ${cOp}`:''}
function cPress(b){
  if(b==='C'){cDisp='0';cPrev=null;cOp=null;cRst=false;}
  else if(b==='⌫'){cDisp=cDisp.length>1?cDisp.slice(0,-1):'0';}
  else if(['+','-','×','÷','%'].includes(b)){cPrev=parseFloat(cDisp);cOp=b;cRst=true;}
  else if(b==='='){
    if(cPrev!==null&&cOp){const c=parseFloat(cDisp);let r=cOp==='+'?cPrev+c:cOp==='-'?cPrev-c:cOp==='×'?cPrev*c:cOp==='÷'?(c?cPrev/c:0):cPrev*(c/100);cDisp=String(parseFloat(r.toFixed(8)));cPrev=null;cOp=null;cRst=true;}
  } else {
    if(cRst){cDisp=b==='.'?'0.':b;cRst=false;}
    else{if(b==='.'&&cDisp.includes('.'))return;cDisp=cDisp==='0'&&b!=='.'?b:cDisp+b;}
  }
  updCalc();
}

let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBtn').style.display = 'flex';
});
window.addEventListener('appinstalled', () => {
  document.getElementById('installBtn').style.display = 'none';
  deferredPrompt = null;
});
function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
  }
}

loadCurrent(); render();
